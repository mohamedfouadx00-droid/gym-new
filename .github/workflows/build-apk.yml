name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle Wrapper is present
        # The wrapper scripts (gradlew / gradlew.bat) and
        # gradle-wrapper.properties are committed to the repo, but the
        # wrapper jar itself is a binary bootstrap file. This step
        # (re)generates it from the pinned Gradle version above, so the
        # build always uses a genuine, verifiable wrapper jar.
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gym-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
