# Project-wide Gradle settings.

# Increase JVM heap available to Gradle daemon.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable Gradle parallel & configuration cache friendly defaults.
org.gradle.parallel=true
org.gradle.caching=true

# Use AndroidX package structure.
android.useAndroidX=true

# Kotlin code style.
kotlin.code.style=official

# Disable unused build features to keep the bootstrap build fast and simple.
android.defaults.buildfeatures.buildconfig=false
android.nonTransitiveRClass=true
android.nonFinalResIds=false
